<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Career Paths Infographic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .path-card.active {
            background-color: white;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
            --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(1px + var(--tw-ring-offset-width)) #3b82f6;
            box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000);
        }

        .path-card.active h3 {
            color: #2563eb;
        }

        .animate-detail {
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .sticky-top {
            position: sticky;
            top: 2rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8 lg:p-12">

    <div class="max-w-7xl mx-auto">
        
        <!-- Foundation Node -->
        <section class="mb-12 flex flex-col items-center">
            <header class="text-center mb-8">
                <div class="inline-flex items-center justify-center p-2 bg-blue-100 rounded-full mb-3">
                    <i data-lucide="book-open" class="text-blue-600 mr-2 w-4 h-4"></i>
                    <span class="text-blue-700 font-bold text-xs tracking-wide uppercase">The Starting Line</span>
                </div>
                <h1 class="text-3xl md:text-5xl font-black mb-3 tracking-tight">
                    Beyond <span class="text-blue-600">Java SE</span>
                </h1>
            </header>

        		<div class="max-w-4xl mx-auto mb-4 px-4 sm:px-6 lg:px-8 bg-orange-50 border border-orange-200 text-orange-800 py-3 rounded-md">
        		  <p class="text-sm">
        			Vibe-coded and re-interpreted based on SP Java OOP Notes
        		  </p>
        		</div>
          
            <div class="relative group w-full max-w-2xl">
                <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl blur opacity-20 group-hover:opacity-30 transition duration-1000"></div>
                <div class="relative p-6 bg-white border border-blue-100 rounded-2xl shadow-sm flex flex-col md:flex-row items-center gap-6">
                    <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg transform rotate-3 flex-shrink-0">
                        <i data-lucide="code" class="text-white w-10 h-10"></i>
                    </div>
                    <div class="flex-grow text-center md:text-left">
                        <h2 class="text-2xl font-bold text-slate-800">Master Java Standard Edition</h2>
                        <p class="text-slate-500 text-sm mb-3">The essential prerequisite for all Java specializations.</p>
                        <div class="flex flex-wrap justify-center md:justify-start gap-4">
                            <span class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 bg-slate-100 px-2 py-1 rounded">
                                <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div> OOP & Logic
                            </span>
                            <span class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 bg-slate-100 px-2 py-1 rounded">
                                <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div> Streams API
                            </span>
                            <span class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 bg-slate-100 px-2 py-1 rounded">
                                <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div> Concurrency
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="h-12 w-0.5 bg-gradient-to-b from-blue-200 to-transparent mt-2"></div>
        </section>

        <!-- Side-by-Side Main Area -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Left Column: List -->
            <div id="path-list" class="lg:col-span-4 space-y-3">
                <div class="flex items-center gap-2 mb-4 px-2">
                    <i data-lucide="arrow-right" class="text-blue-600 w-4 h-4"></i>
                    <h3 class="font-bold text-slate-500 uppercase tracking-widest text-xs">Choose Your Specialization</h3>
                </div>
                <!-- Buttons will be injected here -->
            </div>

            <!-- Right Column: Details -->
            <div class="lg:col-span-8 sticky-top">
                <div id="detail-container">
                    <!-- Details will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const careerPaths = [
            {
                id: 'jakarta',
                title: "Jakarta EE (Enterprise)",
                category: "Enterprise Software",
                icon: 'building-2',
                iconColor: 'text-purple-500',
                description: "Building large-scale, robust server-side applications for corporations and banks.",
                tools: ["Spring Framework", "Jakarta EE", "Hibernate ORM", "GlassFish"],
                industry: "FinTech, Banking, Insurance, Healthcare",
                difficulty: "Advanced",
                accent: "text-purple-600",
                diffColor: "bg-orange-500"
            },
            {
                id: 'android',
                title: "Android Development",
                category: "Mobile Apps",
                icon: 'smartphone',
                iconColor: 'text-green-600',
                description: "Developing native mobile applications for the world's most popular OS.",
                tools: ["Android SDK", "Android Studio", "Kotlin (Interoperable)", "Jetpack"],
                industry: "Consumer Apps, E-commerce, Mobile Startups",
                difficulty: "Intermediate",
                accent: "text-green-600",
                diffColor: "bg-green-500"
            },
            {
                id: 'cloud',
                title: "Cloud & Microservices",
                category: "Modern Infrastructure",
                icon: 'cloud',
                iconColor: 'text-blue-500',
                description: "Scaling applications using containerization and distributed system architecture.",
                tools: ["Spring Boot", "Docker", "Kubernetes", "AWS/Azure SDKs"],
                industry: "SaaS, Tech Giants, Streaming Services",
                difficulty: "Expert",
                accent: "text-blue-600",
                diffColor: "bg-red-500"
            },
            {
                id: 'data',
                title: "Data Engineering",
                category: "Big Data & AI",
                icon: 'database',
                iconColor: 'text-amber-600',
                description: "Building the pipelines that process and analyze massive volumes of data.",
                tools: ["Apache Spark", "Apache Kafka", "Hadoop", "Flink"],
                industry: "Analytics, Marketing Tech, AI Research",
                difficulty: "Advanced",
                accent: "text-amber-600",
                diffColor: "bg-orange-500"
            },
            {
                id: 'desktop',
                title: "Desktop Applications",
                category: "Local Software",
                icon: 'monitor',
                iconColor: 'text-slate-600',
                description: "Creating cross-platform desktop software with rich graphical user interfaces.",
                tools: ["JavaFX", "Swing", "IntelliJ Platform SDK", "FlatLaf"],
                industry: "Engineering Tools, Internal Business Apps",
                difficulty: "Intermediate",
                accent: "text-slate-600",
                diffColor: "bg-green-500"
            },
            {
                id: 'games',
                title: "Game Development",
                category: "Interactive Media",
                icon: 'gamepad-2',
                iconColor: 'text-rose-500',
                description: "Designing logic and engines for indie games and high-performance simulations.",
                tools: ["LibGDX", "LWJGL (OpenGL)", "jMonkeyEngine", "Minecraft Modding"],
                industry: "Indie Game Studios, Education, Simulation",
                difficulty: "Intermediate",
                accent: "text-rose-600",
                diffColor: "bg-green-500"
            }
        ];

        function renderList() {
            const list = document.getElementById('path-list');
            careerPaths.forEach((path, index) => {
                const btn = document.createElement('button');
                btn.id = `btn-${path.id}`;
                btn.className = `path-card w-full text-left p-4 rounded-xl border transition-all duration-200 flex items-center gap-4 group bg-white border-slate-200 hover:border-slate-300 hover:bg-slate-50`;
                btn.onclick = () => selectPath(path.id);
                
                btn.innerHTML = `
                    <div class="p-2.5 rounded-lg bg-white border border-slate-100 shadow-sm group-hover:scale-110 transition-transform">
                        <i data-lucide="${path.icon}" class="${path.iconColor} w-5 h-5"></i>
                    </div>
                    <div class="flex-grow">
                        <h3 class="font-bold text-sm text-slate-700 transition-colors">${path.title}</h3>
                        <p class="text-[10px] uppercase font-bold text-slate-400 tracking-tight">${path.category}</p>
                    </div>
                    <i data-lucide="chevron-right" class="text-slate-300 opacity-0 group-hover:opacity-100 w-4 h-4 transition-all"></i>
                `;
                list.appendChild(btn);
            });
            lucide.createIcons();
        }

        function selectPath(id) {
            const path = careerPaths.find(p => p.id === id);
            
            // Update button styles
            document.querySelectorAll('.path-card').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');

            // Render Detail
            const container = document.getElementById('detail-container');
            container.innerHTML = `
                <div class="bg-slate-900 text-white rounded-3xl shadow-2xl overflow-hidden border border-slate-800 animate-detail">
                    <div class="relative p-8 md:p-10">
                        <div class="absolute top-0 right-0 p-8 opacity-5 pointer-events-none">
                            <i data-lucide="${path.icon}" style="width: 240px; height: 240px;"></i>
                        </div>

                        <div class="relative z-10">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="p-3 bg-white/10 backdrop-blur-md rounded-xl border border-white/10">
                                    <i data-lucide="${path.icon}" class="text-white w-7 h-7"></i>
                                </div>
                                <div>
                                    <h2 class="text-3xl font-black tracking-tight">${path.title}</h2>
                                    <span class="text-xs font-bold uppercase tracking-widest ${path.accent}">
                                        ${path.category}
                                    </span>
                                </div>
                            </div>

                            <p class="text-slate-300 text-lg mb-8 leading-relaxed max-w-2xl">
                                ${path.description}
                            </p>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="space-y-6">
                                    <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
                                        <h4 class="flex items-center gap-2 mb-3 text-slate-400 uppercase text-[10px] font-bold tracking-widest">
                                            <i data-lucide="building-2" class="w-3.5 h-3.5"></i> Major Industries
                                        </h4>
                                        <p class="text-lg font-bold text-blue-400">${path.industry}</p>
                                    </div>

                                    <div class="flex items-start gap-4 p-4 rounded-xl bg-blue-500/10 border border-blue-500/20">
                                        <i data-lucide="info" class="text-blue-400 mt-0.5 flex-shrink-0 w-4 h-4"></i>
                                        <div>
                                            <p class="text-xs text-white font-bold mb-1 uppercase tracking-wider">Expert Tip</p>
                                            <p class="text-xs text-slate-400 leading-relaxed">
                                                Focus on <strong>${path.tools[0]}</strong> first. Most companies hiring for this path consider it a mandatory skill.
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div class="space-y-4">
                                    <div class="flex justify-between items-center pb-2 border-b border-white/10">
                                        <h4 class="flex items-center gap-2 font-bold text-xs uppercase tracking-widest text-slate-400">
                                            <i data-lucide="wrench" class="w-3.5 h-3.5"></i> Technology Stack
                                        </h4>
                                        <span class="px-2 py-0.5 rounded text-[10px] font-black uppercase text-white ${path.diffColor}">
                                            ${path.difficulty}
                                        </span>
                                    </div>
                                    
                                    <div class="grid grid-cols-1 gap-2">
                                        ${path.tools.map(tool => `
                                            <div class="flex items-center justify-between p-3.5 bg-white/5 border border-white/5 rounded-xl hover:bg-white/10 transition-colors group">
                                                <span class="text-sm font-semibold">${tool}</span>
                                                <i data-lucide="external-link" class="w-3 h-3 opacity-0 group-hover:opacity-40 transition-opacity"></i>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Initialize
        renderList();
        selectPath('jakarta');
    </script>
</body>
</html>
