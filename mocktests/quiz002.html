<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Mock Quiz 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
        <!-- Header Section -->
        <div class="bg-emerald-600 p-8 text-white">
            <div class="flex justify-between items-center mb-4">
                <span class="px-3 py-1 bg-emerald-500/40 rounded-full text-xs font-bold tracking-wider uppercase">Level: Intermediate-Beginner</span>
                <span id="score-counter" class="font-mono bg-white/20 px-3 py-1 rounded-lg">Score: 0</span>
            </div>
            <h1 class="text-2xl font-bold">Mock Quiz 2: Data, I/O & Control</h1>
            <p class="text-emerald-100 mt-2 text-sm">Deep dive into casting, buffer logic, and complex loops.</p>
            
            <div class="mt-6 bg-emerald-900/20 rounded-full h-1.5 w-full">
                <div id="progress-bar" class="bg-emerald-200 h-1.5 rounded-full transition-all duration-700 ease-in-out" style="width: 0%"></div>
            </div>
            <p id="question-counter" class="text-xs mt-3 text-emerald-100 font-medium">Question 1 of 10</p>
        </div>

        <div id="quiz-content" class="p-8">
            <div id="question-area" class="fade-in">
                <h2 id="question-text" class="text-lg font-bold text-slate-800 mb-8 leading-relaxed">Loading challenge...</h2>
                
                <div id="options-grid" class="grid grid-cols-1 gap-4">
                    <!-- Options dynamically injected -->
                </div>

                <div id="explanation-container" class="mt-8 p-5 rounded-2xl bg-emerald-50 border border-emerald-100 hidden fade-in">
                    <div class="flex items-start gap-3">
                        <div id="status-icon" class="mt-1"></div>
                        <div>
                            <p id="result-text" class="font-bold text-emerald-900 text-base"></p>
                            <p id="explanation-text" class="text-emerald-700 text-sm mt-1 leading-relaxed italic"></p>
                        </div>
                    </div>
                </div>

                <div class="mt-10 flex justify-end">
                    <button id="next-btn" class="hidden px-8 py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 active:scale-95 transition-all shadow-lg shadow-emerald-200">
                        Continue
                    </button>
                </div>
            </div>
        </div>

        <div id="results-area" class="hidden p-12 text-center fade-in">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full mb-6">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-900">Quiz 2 Complete!</h2>
            <p id="final-score" class="text-lg text-slate-500 mt-3 font-medium"></p>
            
            <div class="mt-10 flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="location.reload()" class="px-8 py-4 bg-emerald-600 text-white rounded-2xl font-bold hover:bg-emerald-700 transition-all shadow-xl hover:shadow-emerald-200">
                    Restart Quiz
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "What is the result of 'System.out.println(10 + 20 + \"Java\");'?",
                options: ["1020Java", "30Java", "Java30", "Java1020"],
                correct: 1,
                explanation: "Java evaluates from left to right; the integers are added first (30) before being concatenated with the String."
            },
            {
                question: "What is the output of 'System.out.println('A' + 'B');' in Java?",
                options: ["AB", "131", "6566", "Compiler Error"],
                correct: 1,
                explanation: "When using the arithmetic '+' operator on 'char' data types, Java promotes them to integers using their ASCII values ('A' is 65 and 'B' is 66). Therefore, 65 + 66 equals 131."
            },
            {
                question: "If a byte variable 'b' is 127, what is the result of 'b++' in Java?",
                options: ["128", "0", "-128", "Compile error"],
                correct: 2,
                explanation: "The byte type ranges from -128 to 127; incrementing 127 causes an overflow, wrapping around to -128."
            },
            {
                question: "What happens when you call 'scanner.nextLine()' immediately after 'scanner.nextInt()'?",
                options: ["It reads the next word", "It skips input and returns an empty string", "It waits for user input", "It throws a NoSuchElementException"],
                correct: 1,
                explanation: "nextInt() leaves the newline character in the buffer, which nextLine() then consumes instantly as an empty string."
            },
            {
                question: "What is the result of '(int) 7.9 + (int) 6.7'?",
                options: ["14", "13", "14.6", "15"],
                correct: 1,
                explanation: "Casting truncates decimals before addition: 7 + 6 = 13."
            },
            {
                question: "Which operator prevents the second condition from being checked if the first is false?",
                options: ["&", "|", "&&", "^"],
                correct: 2,
                explanation: "The '&&' (short-circuit AND) skips the second operand if the first is false, improving performance and safety."
            },
            {
                question: "In a switch statement, can you use a 'long' data type for the expression?",
                options: ["Yes, always", "Only if cast to int", "No, it is not allowed", "Yes, in Java 17+"],
                correct: 2,
                explanation: "Switch expressions only support char, byte, short, int, Character, Byte, Short, Integer, String, or enum; 'long' is not supported."
            },
            {
                question: "How do you break out of an inner loop and an outer loop simultaneously?",
                options: ["break break;", "System.exit(0);", "Using a labeled break", "return;"],
                correct: 2,
                explanation: "A labeled break (e.g., 'break outer;') allows you to exit specific nested loops directly."
            },
            {
                question: "What is the output of 'System.out.println(String.format(\"%05d\", 42));' (equivalent to printf)?",
                options: ["42", "00042", "42000", " 42"],
                correct: 1,
                explanation: "The '%05d' flag pads the number with leading zeros until the total width reaches 5 characters."
            },
            {
                question: "What will happen in a 'do-while' loop if the condition is false on the first check?",
                options: ["Loop never runs", "Infinite loop", "Runs exactly once", "Compilation error"],
                correct: 2,
                explanation: "Do-while loops are post-test loops, meaning the body is executed before the condition is even checked."
            }
        ];

        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        const elements = {
            question: document.getElementById('question-text'),
            options: document.getElementById('options-grid'),
            nextBtn: document.getElementById('next-btn'),
            explanation: document.getElementById('explanation-container'),
            result: document.getElementById('result-text'),
            explanationText: document.getElementById('explanation-text'),
            progress: document.getElementById('progress-bar'),
            counter: document.getElementById('question-counter'),
            score: document.getElementById('score-counter'),
            content: document.getElementById('quiz-content'),
            results: document.getElementById('results-area'),
            finalScore: document.getElementById('final-score'),
            statusIcon: document.getElementById('status-icon')
        };

        function loadQuestion() {
            isAnswered = false;
            const current = quizData[currentIndex];
            
            elements.question.innerText = `${currentIndex + 1}. ${current.question}`;
            elements.options.innerHTML = '';
            elements.explanation.classList.add('hidden');
            elements.nextBtn.classList.add('hidden');
            
            const progress = ((currentIndex) / quizData.length) * 100;
            elements.progress.style.width = `${progress}%`;
            elements.counter.innerText = `Question ${currentIndex + 1} of ${quizData.length}`;
            
            current.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-emerald-200 hover:bg-emerald-50 font-semibold text-slate-700 shadow-sm";
                btn.innerText = option;
                btn.onclick = () => selectOption(index);
                elements.options.appendChild(btn);
            });
        }

        function selectOption(index) {
            if (isAnswered) return;
            isAnswered = true;
            
            const current = quizData[currentIndex];
            const buttons = elements.options.getElementsByTagName('button');
            const correct = index === current.correct;

            if (correct) {
                score++;
                elements.score.innerText = `Score: ${score}`;
                buttons[index].className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-emerald-500 bg-emerald-500 text-white font-bold shadow-lg";
                elements.result.innerText = "Correct! Well done.";
                elements.statusIcon.innerHTML = '✨';
            } else {
                buttons[index].className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-rose-500 bg-rose-500 text-white font-bold shadow-lg";
                buttons[current.correct].className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-emerald-500 text-emerald-700 bg-emerald-50 font-bold";
                elements.result.innerText = "Not quite...";
                elements.statusIcon.innerHTML = '💡';
            }

            elements.explanation.classList.remove('hidden');
            elements.explanationText.innerText = current.explanation;
            
            for (let btn of buttons) btn.classList.add('cursor-default');
            elements.nextBtn.classList.remove('hidden');
        }

        elements.nextBtn.onclick = () => {
            currentIndex++;
            if (currentIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            elements.content.classList.add('hidden');
            elements.results.classList.remove('hidden');
            elements.progress.style.width = "100%";
            elements.finalScore.innerText = `You correctly answered ${score} out of ${quizData.length} challenges.`;
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
