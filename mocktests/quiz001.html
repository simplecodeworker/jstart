<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Beginner Mock Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .option-btn {
            transition: all 0.2s ease;
        }
        .explanation-box {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header Section -->
        <div class="bg-indigo-600 p-6 text-white">
            <h1 class="text-2xl font-bold">Mock Quiz 1: Data, I/O and Control Statements</h1>
            <p class="text-indigo-100 mt-1">Java Fundamentals for Beginners</p>
            
            <div class="mt-4 bg-indigo-500/30 rounded-full h-2 w-full">
                <div id="progress-bar" class="bg-indigo-200 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-xs mt-2 text-indigo-100">
                <span id="question-counter">Question 1 of 10</span>
                <span id="score-counter">Score: 0</span>
            </div>
        </div>

        <!-- Question Section -->
        <div id="quiz-content" class="p-8">
            <div id="question-area" class="fade-in">
                <h2 id="question-text" class="text-xl font-semibold text-slate-800 mb-6">Loading question...</h2>
                
                <div id="options-grid" class="space-y-3">
                    <!-- Buttons will be injected here -->
                </div>

                <!-- Explanation Box (revealed on click) -->
                <div id="explanation-container" class="mt-6 p-4 rounded-lg bg-green-50 border border-green-200 hidden fade-in">
                    <p id="result-text" class="font-bold text-green-800 mb-1"></p>
                    <p id="explanation-text" class="text-green-700 text-sm italic"></p>
                </div>

                <div class="mt-8 flex justify-end">
                    <button id="next-btn" class="hidden px-6 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-colors shadow-md">
                        Next Question
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Screen (hidden by default) -->
        <div id="results-area" class="hidden p-10 text-center fade-in">
            <div class="mb-6">
                <svg class="w-20 h-20 text-indigo-600 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800">Quiz Completed!</h2>
            <p id="final-score" class="text-xl text-slate-600 mt-2">You scored 0 out of 10</p>
            <button onclick="restartQuiz()" class="mt-8 px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg">
                Try Again
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Which of the following is a valid Java identifier?",
                options: ["1stVariable", "variable_name", "class", "my-variable"],
                correct: 1,
                explanation: "Identifiers can contain letters, numbers, underscores, and dollar signs, but cannot start with a digit or be a reserved keyword."
            },
            {
                question: "What is the default value of a boolean variable in Java when declared as a class member?",
                options: ["true", "null", "false", "0"],
                correct: 2,
                explanation: "In Java, instance boolean variables default to false, while numeric types default to 0."
            },
            {
                question: "Which data type is used to store a single 16-bit Unicode character?",
                options: ["String", "byte", "char", "short"],
                correct: 2,
                explanation: "The 'char' data type is a single 16-bit Unicode character with a minimum value of '\\u0000'."
            },
            {
                question: "What is the correct way to perform explicit casting from a double to an int?",
                options: ["int x = double y;", "int x = (int) y;", "int x = y.toInt();", "int x = cast(y);"],
                correct: 1,
                explanation: "Explicit casting uses the (targetType) syntax to force conversion of potentially data-losing types."
            },
            {
                question: "Which Scanner method is used to read a complete line of text including spaces?",
                options: ["next()", "read()", "nextLine()", "nextString()"],
                correct: 2,
                explanation: "nextLine() reads everything until a newline character is encountered, while next() only reads until the next whitespace."
            },
            {
                question: "What will be the output of: System.out.printf(\"%.2f\", 5.6789);?",
                options: ["5.6789", "5.68", "5.67", "5.7"],
                correct: 1,
                explanation: "The format specifier '%.2f' rounds the floating-point number to two decimal places."
            },
            {
                question: "In a switch statement, which keyword is used to provide a default block if no cases match?",
                options: ["else", "catch", "break", "default"],
                correct: 3,
                explanation: "The 'default' case handles any values not explicitly covered by the 'case' labels."
            },
            {
                question: "Which loop is guaranteed to execute at least once, even if the condition is false?",
                options: ["for", "while", "do-while", "enhanced-for"],
                correct: 2,
                explanation: "A do-while loop evaluates its condition at the end of the block, ensuring the body runs at least once."
            },
            {
                question: "What is the syntax for an enhanced for-loop (for-each) to iterate through an array 'arr' of integers?",
                options: ["for(int i : arr)", "for(int i = 0; i < arr; i++)", "foreach(int i in arr)", "for(arr : int i)"],
                correct: 0,
                explanation: "The enhanced for-loop uses the 'for(Type element : collection)' syntax for easy iteration."
            },
            {
                question: "What happens if a 'break' statement is missing at the end of a case block in a switch statement?",
                options: ["Compiler error", "The loop terminates", "Execution falls through to the next case", "The program crashes"],
                correct: 2,
                explanation: "This is known as 'fall-through', where subsequent case blocks execute until a break or the end of the switch is reached."
            }
        ];

        let currentIndex = 0;
        let score = 0;
        let answered = false;

        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const nextBtn = document.getElementById('next-btn');
        const explanationContainer = document.getElementById('explanation-container');
        const resultText = document.getElementById('result-text');
        const explanationText = document.getElementById('explanation-text');
        const progressBar = document.getElementById('progress-bar');
        const counterText = document.getElementById('question-counter');
        const scoreCounter = document.getElementById('score-counter');
        const quizContent = document.getElementById('quiz-content');
        const resultsArea = document.getElementById('results-area');

        function loadQuestion() {
            answered = false;
            const current = quizData[currentIndex];
            
            // UI Updates
            questionText.innerText = `${currentIndex + 1}. ${current.question}`;
            optionsGrid.innerHTML = '';
            explanationContainer.classList.add('hidden');
            nextBtn.classList.add('hidden');
            
            // Update Progress
            const progress = ((currentIndex) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;
            counterText.innerText = `Question ${currentIndex + 1} of ${quizData.length}`;
            
            // Create Option Buttons
            current.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 font-medium text-slate-700 focus:outline-none";
                btn.innerText = option;
                btn.onclick = () => selectOption(index);
                optionsGrid.appendChild(btn);
            });
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;
            
            const current = quizData[currentIndex];
            const buttons = optionsGrid.getElementsByTagName('button');
            const isCorrect = index === current.correct;

            if (isCorrect) {
                score++;
                scoreCounter.innerText = `Score: ${score}`;
                buttons[index].classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                resultText.innerText = "Correct! ✨";
            } else {
                buttons[index].classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                buttons[current.correct].classList.add('bg-green-100', 'border-green-500');
                resultText.innerText = "Incorrect";
                resultText.className = "font-bold text-red-800 mb-1";
            }

            // Show Explanation with Green Theme (as requested)
            explanationContainer.classList.remove('hidden', 'bg-red-50', 'border-red-200');
            explanationContainer.classList.add('bg-green-50', 'border-green-200');
            explanationText.innerText = current.explanation;
            
            // Disable all buttons
            for (let btn of buttons) {
                btn.classList.add('cursor-default');
            }

            nextBtn.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentIndex++;
            if (currentIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizContent.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            progressBar.style.width = "100%";
            document.getElementById('final-score').innerText = `You scored ${score} out of ${quizData.length}`;
        }

        function restartQuiz() {
            currentIndex = 0;
            score = 0;
            scoreCounter.innerText = `Score: 0`;
            quizContent.classList.remove('hidden');
            resultsArea.classList.add('hidden');
            loadQuestion();
        }

        // Initialize first question
        window.onload = loadQuestion;

    </script>
</body>
</html>
