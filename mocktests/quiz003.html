<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Quiz 2: Data, I/O and Control Statements</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .option-btn {
            transition: all 0.2s ease;
        }
        .explanation-box {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header Section -->
        <div class="bg-indigo-600 p-6 text-white">
            <h1 class="text-2xl font-bold">Mock Quiz 2: Data, I/O and Control Statements</h1>
            <p class="text-indigo-100 mt-1">Java Fundamentals for Beginners</p>
            
            <div class="mt-4 bg-indigo-500/30 rounded-full h-2 w-full">
                <div id="progress-bar" class="bg-indigo-200 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-xs mt-2 text-indigo-100">
                <span id="question-counter">Question 1 of 10</span>
                <span id="score-counter">Score: 0</span>
            </div>
        </div>

        <!-- Question Section -->
        <div id="quiz-content" class="p-8">
            <div id="question-area" class="fade-in">
                <h2 id="question-text" class="text-xl font-semibold text-slate-800 mb-6">Loading question...</h2>
                
                <div id="options-grid" class="space-y-3">
                    <!-- Buttons will be injected here -->
                </div>

                <!-- Explanation Box (revealed on click with required green background) -->
                <div id="explanation-container" class="mt-6 p-4 rounded-lg bg-green-50 border border-green-200 hidden fade-in">
                    <p id="result-text" class="font-bold text-green-800 mb-1"></p>
                    <p id="explanation-text" class="text-green-700 text-sm italic"></p>
                </div>

                <div class="mt-8 flex justify-end">
                    <button id="next-btn" class="hidden px-6 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-colors shadow-md">
                        Next Question
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Screen (hidden by default) -->
        <div id="results-area" class="hidden p-10 text-center fade-in">
            <div class="mb-6">
                <svg class="w-20 h-20 text-indigo-600 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800">Quiz Completed!</h2>
            <p id="final-score" class="text-xl text-slate-600 mt-2">You scored 0 out of 10</p>
            <button onclick="restartQuiz()" class="mt-8 px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg">
                Try Again
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Which keyword is used in Java to declare a constant value that cannot be reassigned?",
                options: ["const", "final", "static", "immutable"],
                correct: 1,
                explanation: "In Java, the 'final' keyword prevents a variable's value from being modified once initialized."
            },
            {
                question: "Which of the following is the correct way to declare and initialize a float variable in Java?",
                options: ["float f = 3.14;", "float f = (double)3.14;", "float f = 3.14f;", "float f = 3.14Fd;"],
                correct: 2,
                explanation: "By default, decimal values are treated as doubles in Java; you must append 'f' or 'F' to declare float literals."
            },
            {
                question: "What is the output of 'System.out.println(5 / 2 * 2.0);' in Java?",
                options: ["5.0", "4.0", "5", "4"],
                correct: 1,
                explanation: "Java does integer division first (5 / 2 = 2), then promotes the result to double for multiplication (2 * 2.0 = 4.0)."
            },
            {
                question: "What happens if you try to use a local variable inside a method without initializing it first?",
                options: ["It defaults to 0 or false", "It defaults to null", "It causes a compilation error", "It runs but has a random memory value"],
                correct: 2,
                explanation: "Unlike class fields, local variables in Java do not receive default values and cause compile-time errors if read uninitialized."
            },
            {
                question: "Which Scanner method should you use to check if the next input token can be parsed as an integer without crashing?",
                options: ["nextInt()", "hasNextInt()", "checkNextInt()", "isNextInt()"],
                correct: 1,
                explanation: "The 'hasNextInt()' method safely returns true if the next token is valid, avoiding a InputMismatchException."
            },
            {
                question: "Which printf format specifiers are used to print a String and an integer respectively?",
                options: ["%s and %d", "%str and %int", "%s and %i", "%f and %d"],
                correct: 0,
                explanation: "In standard formatted printing, '%s' placeholder represents a String, and '%d' represents a decimal integer."
            },
            {
                question: "What is the requirement for the conditional expression inside an 'if' statement in Java?",
                options: ["It can evaluate to any integer value", "It must evaluate strictly to a boolean value", "It can evaluate to an object reference", "It must be an assignment operation"],
                correct: 1,
                explanation: "Java does not support 'truthy' values like numbers or objects in conditions; expressions must strictly yield 'true' or 'false'."
            },
            {
                question: "Which of the following primitive types is NOT allowed as a switch expression target variable in Java?",
                options: ["double", "char", "byte", "int"],
                correct: 0,
                explanation: "Switch statements do not support floating-point types ('double' or 'float') because precise equality comparisons are difficult."
            },
            {
                question: "What is the result of executing the loop: 'for ( ; ; ) { System.out.println(\"Hello\"); }'?",
                options: ["Compilation error due to missing expressions", "It runs exactly once and exits", "An infinite loop printing 'Hello'", "Nothing is printed because the loop is empty"],
                correct: 2,
                explanation: "Omitting the condition, initialization, and increment expressions in a 'for' loop defaults to a valid, infinite loop."
            },
            {
                question: "How many times will this loop print 'Java'? 'for (int i = 0; i < 5; ++i) { System.out.println(\"Java\"); }'",
                options: ["0", "4", "5", "6"],
                correct: 2,
                explanation: "The loop runs for index values 0, 1, 2, 3, and 4. Changing 'i++' to '++i' inside the loop update does not alter the count."
            }
        ];

        let currentIndex = 0;
        let score = 0;
        let answered = false;

        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const nextBtn = document.getElementById('next-btn');
        const explanationContainer = document.getElementById('explanation-container');
        const resultText = document.getElementById('result-text');
        const explanationText = document.getElementById('explanation-text');
        const progressBar = document.getElementById('progress-bar');
        const counterText = document.getElementById('question-counter');
        const scoreCounter = document.getElementById('score-counter');
        const quizContent = document.getElementById('quiz-content');
        const resultsArea = document.getElementById('results-area');

        function loadQuestion() {
            answered = false;
            const current = quizData[currentIndex];
            
            // UI Updates
            questionText.innerText = `${currentIndex + 1}. ${current.question}`;
            optionsGrid.innerHTML = '';
            explanationContainer.classList.add('hidden');
            nextBtn.classList.add('hidden');
            
            // Update Progress
            const progress = ((currentIndex) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;
            counterText.innerText = `Question ${currentIndex + 1} of ${quizData.length}`;
            
            // Create Option Buttons
            current.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 font-medium text-slate-700 focus:outline-none";
                btn.innerText = option;
                btn.onclick = () => selectOption(index);
                optionsGrid.appendChild(btn);
            });
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;
            
            const current = quizData[currentIndex];
            const buttons = optionsGrid.getElementsByTagName('button');
            const isCorrect = index === current.correct;

            if (isCorrect) {
                score++;
                scoreCounter.innerText = `Score: ${score}`;
                buttons[index].classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                resultText.innerText = "Correct! ✨";
            } else {
                buttons[index].classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                buttons[current.correct].classList.add('bg-green-100', 'border-green-500');
                resultText.innerText = "Incorrect";
                resultText.className = "font-bold text-red-800 mb-1";
            }

            // Show Explanation with Green Theme (as requested)
            explanationContainer.classList.remove('hidden', 'bg-red-50', 'border-red-200');
            explanationContainer.classList.add('bg-green-50', 'border-green-200');
            explanationText.innerText = current.explanation;
            
            // Disable all buttons
            for (let btn of buttons) {
                btn.classList.add('cursor-default');
            }

            nextBtn.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentIndex++;
            if (currentIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizContent.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            progressBar.style.width = "100%";
            document.getElementById('final-score').innerText = `You scored ${score} out of ${quizData.length}`;
        }

        function restartQuiz() {
            currentIndex = 0;
            score = 0;
            scoreCounter.innerText = `Score: 0`;
            quizContent.classList.remove('hidden');
            resultsArea.classList.add('hidden');
            loadQuestion();
        }

        // Initialize first question
        window.onload = loadQuestion;
    </script>
</body>
</html>
